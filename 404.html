{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:70vh;text-align:center;">
  <div style="font-size:6rem;opacity:.15;"><i class="bi bi-robot"></i></div>
  <h1 style="font-size:5rem;font-weight:800;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">404</h1>
  <p class="lead mt-2 mb-4 text-muted">That page doesn't exist. Let's get you back on track!</p>
  <a href="/" class="btn btn-primary-custom"><i class="bi bi-house-fill me-2"></i>Go Home</a>
</div>
{% endblock %}
