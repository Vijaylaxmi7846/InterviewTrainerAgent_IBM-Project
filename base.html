<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}InterviewTrainer Agent — IBM Watsonx{% endblock %}</title>

  <!-- Bootstrap 5.3 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  {% block head_extra %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- ── Navbar ─────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-app sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
        <div class="brand-icon">
          <i class="bi bi-robot"></i>
        </div>
        <span class="brand-text">InterviewTrainer <span class="brand-ai">AI</span></span>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-center gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'chat' %}active{% endif %}" href="{{ url_for('chat') }}">
              <i class="bi bi-chat-dots me-1"></i>Interview
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
              <i class="bi bi-bar-chart-line me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item ms-2">
            <button class="btn btn-sm btn-theme-toggle" id="themeToggle" title="Toggle theme">
              <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
            </button>
          </li>
          <li class="nav-item">
            <a class="btn btn-sm btn-primary-custom ms-1" href="{{ url_for('chat') }}">
              <i class="bi bi-play-fill me-1"></i>Start Practice
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Main Content ───────────────────────────────────────────────────── -->
  <main class="flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────────── -->
  <footer class="app-footer mt-auto">
    <div class="container-fluid px-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center py-3">
        <span class="footer-brand">
          <i class="bi bi-robot me-1"></i>InterviewTrainer Agent
        </span>
        <span class="footer-powered">
          Powered by <strong>IBM Watsonx.ai</strong> Granite &nbsp;·&nbsp;
          <span class="footer-rag">RAG-enhanced</span>
        </span>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
